# markers.yaml — единый источник истины по AI-маркерам русской прозы.
#
# Зачем файл. Один маркер живёт в одном месте. Отсюда его читают и человек
# (через references/*.md), и линтер (scripts/stopslop.py). Добавил запись —
# маркер появился и в проверке, и в справочнике. См. CONTRIBUTING.md.
#
# Поля записи:
#   id        короткий уникальный slug (kebab-case).
#   category  одна из: phrases | structures | punctuation | formatting | morphology
#   severity  high | medium | low — насколько верный признак машины.
#   title     человекочитаемое имя.
#   why       чем выдаёт ИИ / почему это слабое письмо.
#   bad       примеры-нарушители (для справочника и тестов линтера).
#   fix       что делать вместо.
#   regex     (необязательно) шаблон Python re, по которому линтер ловит маркер.
#             Без regex маркер остаётся в справочнике, но не ловится автоматом.
#   flags     (необязательно) флаги re: i (IGNORECASE) по умолчанию включён.
#
# Версия корпуса — в CHANGELOG.md.

version: "1.0.0"

markers:

  # ---------------------------------------------------------------- phrases
  - id: empty-opener
    category: phrases
    severity: high
    title: Пустое открытие
    why: Вступление-пустышка вместо первого факта. Самый частый зачин ИИ.
    bad:
      - "В современном динамично развивающемся мире..."
      - "На сегодняшний день..."
      - "В эпоху цифровизации..."
      - "Трудно переоценить роль..."
      - "В наше время..."
    fix: Начать с конкретного факта или действия. Первое предложение должно нести информацию.
    regex: "в современном (динамично развивающемся )?мире|на сегодняшний день|в эпоху цифровизаци|трудно переоценить|в наше время"

  - id: kantselyarit
    category: phrases
    severity: high
    title: Канцелярит и отглагольные существительные
    why: Существительное на -ание/-ение/-ация вместо живого глагола. Машина любит номинализацию.
    bad:
      - "осуществление внедрения"
      - "в целях оптимизации"
      - "произвести оплату"
      - "в рамках реализации"
    fix: Заменить на глагол. «Осуществить внедрение» → «внедрить». «Произвести оплату» → «оплатить».
    regex: "осуществл\\w+|в целях|в рамках реализаци|произвест\\w+ \\w+(ние|цию)"

  - id: copula-allergy
    category: phrases
    severity: high
    title: Копулятивная аллергия
    why: Многословная связка вместо простого «это» или глагола.
    bad:
      - "представляет собой"
      - "является важным"
      - "служит основой"
      - "выступает в качестве"
      - "имеет место быть"
    fix: «Это» или прямой глагол. «X представляет собой Y» → «X — это Y» или «X делает Y».
    regex: "представля\\w+ собой|выступа\\w+ в качестве|служ\\w+ основой|имеет место быть"

  - id: overhedging
    category: phrases
    severity: high
    title: Лишние оговорки (овер-хеджирование)
    why: Дежурная подводка перед мыслью. Машина страхуется в каждом абзаце.
    bad:
      - "важно отметить, что"
      - "стоит подчеркнуть"
      - "следует учитывать"
      - "нельзя не заметить"
      - "необходимо понимать"
      - "как известно"
    fix: Вырезать целиком. Сразу сказать саму мысль.
    regex: "важно (отметить|понимать|подчеркнуть)|стоит (отметить|подчеркнуть)|следует учитывать|нельзя не (заметить|отметить)|необходимо понимать|как известно"

  - id: modal-hedging
    category: phrases
    severity: medium
    title: Модальное хеджирование
    why: «Может/способен/призван/позволяет» в каждом предложении снижает категоричность до пустоты.
    bad:
      - "может стать решением"
      - "способен обеспечить рост"
      - "призван решить задачу"
      - "позволяет повысить"
    fix: Убрать модальность, если факт известен. «Может ускорить» → «ускоряет».
    regex: "призван\\w* (решить|обеспечить|помочь)|способ(ен|на|но) обеспеч"

  - id: promo-register
    category: phrases
    severity: medium
    title: Промо-регистр и пустые эпитеты
    why: Рекламные прилагательные без содержания.
    bad:
      - "уникальное решение"
      - "инновационный подход"
      - "ведущая платформа"
      - "потрясающий функционал"
      - "не имеющий аналогов"
    fix: Заменить конкретикой (что именно делает) или вырезать.
    regex: "уникальн\\w+|инновационн\\w+|не имеющ\\w+ аналог|ведущ(ая|ее|ий) (платформ|решени|компани)"

  - id: anglo-calque
    category: phrases
    severity: medium
    title: Англо-кальки
    why: Дословный перевод английских клише. Модель «думает» по-английски.
    bad:
      - "играет ключевую роль"
      - "в заключение"
      - "в связи с этим"
      - "на самом деле, это"
    fix: "«Играет ключевую роль» → «важен/определяет». «В заключение» → вырезать. «В связи с этим» → «поэтому»."
    regex: "игра\\w+ (ключевую|важную|значимую) роль|в заключение"

  - id: semantic-calque
    category: phrases
    severity: medium
    title: Семантические кальки (English-bias)
    why: "Слово в русском есть, но выбрано под английское значение или сочетаемость. Грамматически чисто, звучит как подстрочник. Тоньше прямой англо-кальки-клише."
    bad:
      - "основание науки (вместо основы)"
      - "уточните маркетинговые усилия (вместо доработайте маркетинг)"
      - "контролируйте за процессом (калька с control over)"
      - "адресовать проблему (address the issue)"
      - "доставить ценность (deliver value)"
      - "на ежедневной основе (on a daily basis)"
    fix: "Вернуть слово, которое носитель выбрал бы первым. «Основание науки» → «основы». «Маркетинговые усилия» → «маркетинг». «Контролировать за» → «следить за / управлять»."
    regex: "основани\\w+ (наук|теори|знани)|маркетингов\\w+ усили|уточн\\w+ \\w+ усили|контролир\\w+ за\\b|на ежедневной основе|адресова\\w+ (проблем|вопрос|задач)"

  - id: artificial-wordforms
    category: phrases
    severity: medium
    title: Искусственное словообразование
    why: "Машина склеивает прилагательное или термин из любого корня плюс суффикс или дефис. Слово выглядит логично, но в живой речи так не говорят."
    bad:
      - "нейросетевой (как украшение)"
      - "маркетингово-аналитический"
      - "дизайнеровский"
      - "клиентоориентированность"
      - "быстро-удобно-надёжно"
    fix: "Заменить обычным словом или развернуть. «Нейросетевой подход» → «подход с нейросетью». «Маркетингово-аналитический» → «маркетинговый и аналитический»."
    regex: "\\w+о-\\w+(ический|альный|ный)\\b|дизайнеровск\\w+|клиентоориентированност\\w+"

  - id: didactic-tone
    category: phrases
    severity: medium
    title: Дидактический (учительский) тон
    why: Текст ведёт за руку, как методичка.
    bad:
      - "давайте рассмотрим"
      - "разберём подробнее"
      - "как мы видим"
      - "стоит понимать, что"
    fix: Перейти к делу. Читатель сам увидит, не объявляй это.
    regex: "давайте (рассмотрим|разберём|посмотрим)|разберём подробнее|как мы (видим|понимаем)"

  - id: pseudo-therapy
    category: phrases
    severity: medium
    title: Псевдо-терапевтический / коучинговый регистр
    why: Натужная эмпатия и валидация чувств там, где её не просили.
    bad:
      - "это нормально, что ты так чувствуешь"
      - "услышь себя"
      - "тихое подтверждение"
      - "ты не одинок в этом"
    fix: Если контекст не личный — вырезать. Если личный — говорить как человек, без шаблонов поддержки.
    regex: "это нормально,? что ты|услышь себя|ты не одинок"

  - id: meta-commentary
    category: phrases
    severity: medium
    title: Мета-комментарий о структуре
    why: Текст объявляет сам себя вместо того, чтобы двигаться.
    bad:
      - "в этой статье мы"
      - "ниже разберём"
      - "как мы увидим далее"
      - "подводя итог"
    fix: Удалить. Пусть текст идёт сам.
    regex: "в (этой|данной) (статье|главе)|ниже (разберём|рассмотрим)|подводя итог|как мы увидим"

  # -------------------------------------------------------------- structures
  - id: binary-contrast
    category: structures
    severity: high
    title: Бинарный контраст «не X, а Y»
    why: Телеграфированный разворот. Самая узнаваемая формула ИИ, до 80% текстов.
    bad:
      - "это не просто инструмент, а целая философия"
      - "это не X — это Y"
      - "дело не в деньгах, дело в принципе"
      - "вопрос не в том, что, а в том, как"
    fix: Сказать Y прямо. «Это новый подход» вместо «это не инструмент, а подход».
    regex: "это не просто \\w+,? (а|это)|не \\w+,? а\\b.{0,30}\\bкак раз"

  - id: rule-of-three
    category: structures
    severity: high
    title: Список ровно из трёх / тройная анафора
    why: Машина систематически выбирает три элемента и повтор предлога.
    bad:
      - "быстро, качественно и надёжно"
      - "без шума, без хаоса, без перегруза"
      - "повышает скорость, качество и эффективность"
    fix: Два элемента или один. Сломать анафору.
    regex: "без \\w+, без \\w+, без \\w+|, \\w+ и \\w+\\."

  - id: gerund-pileup
    category: structures
    severity: high
    title: Нагромождение деепричастий
    why: Цепочка «делая, обеспечивая, привлекая» в одном предложении. У ИИ в 2–5 раз чаще.
    bad:
      - "развивает направления, обеспечивая рост, привлекая инвесторов"
      - "решает задачи, экономя время и повышая лояльность"
    fix: Разбить на 2 предложения с подлежащим-деятелем.
    regex: "(?:(?:\\w{3,}(?:вая|зуя|чивая|ивая|уя|ляя|мя|жа|ча|ща)\\b|\\w{3,}(?:ав|ив|ев|яв|ув|ов|вши)\\b)(?:[^.!?]{0,40}?)(?:,|\\sи\\s)(?:[^.!?]{0,15}?)(?:\\w{3,}(?:вая|зуя|чивая|ивая|уя|ляя|мя|жа|ча|ща)\\b|\\w{3,}(?:ав|ив|ев|яв|ув|ов|вши)\\b|\\w{3,}(?:ая|яя)\\b))|(?:\\w{3,}(?:ая|яя)\\b(?:[^.!?]{0,40}?)(?:,|\\sи\\s)(?:[^.!?]{0,15}?)(?:\\w{3,}(?:вая|зуя|чивая|ивая|уя|ляя|мя|жа|ча|ща)\\b|\\w{3,}(?:ав|ив|ев|яв|ув|ов|вши)\\b))"

  - id: synonym-carousel
    category: structures
    severity: medium
    title: Синонимическая карусель
    why: Один объект называют разными словами из-за штрафа за повтор. Компания → организация → предприятие.
    bad:
      - "Компания растёт. Организация нанимает. Предприятие выходит на рынок."
      - "редактор проверяет, специалист правит, профессионал утверждает (об одном человеке)"
    fix: Повторить одно слово или поставить местоимение. Повтор не грех.
    regex: ""

  - id: dramatic-fragmentation
    category: structures
    severity: medium
    title: Драматическая фрагментация
    why: Обрубки ради значительности. «Коротко. Точно. По делу.»
    bad:
      - "Коротко. Точно. По делу."
      - "И всё. Вот так. Просто."
    fix: Полные предложения. Содержание важнее подачи.
    regex: "(?:[А-ЯЁ][а-яё]*(?:\\s+[а-яёА-ЯЁ]+){0,2}\\.\\s+){2}[А-ЯЁ][а-яё]*(?:\\s+[а-яёА-ЯЁ]+){0,2}\\."

  - id: pseudo-socratic
    category: structures
    severity: medium
    title: Псевдо-сократические подводки
    why: Вопрос-ответ как риторический реквизит.
    bad:
      - "Зачем? Потому что так надо."
      - "Что это значит? Сейчас объясню."
    fix: Сказать прямо, без вопроса-затравки.
    regex: "(зачем|почему|что это значит)\\? (потому что|сейчас|а вот)"

  - id: false-agency
    category: structures
    severity: high
    title: Ложная агентность
    why: Неодушевлённое делает человеческое действие. Машина так избегает называть деятеля.
    bad:
      - "решение рождается само собой"
      - "культура меняется"
      - "рынок вознаграждает смелых"
      - "данные говорят нам"
    fix: Назвать человека. «Команда решила», «покупатели платят за», «аналитик прочитал в данных».
    regex: "решени\\w+ рожда|культура (меняется|сдвига)|рынок (вознагражда|наказыва)|данные говорят"

  - id: nominal-passive
    category: structures
    severity: medium
    title: Канцелярский пассив с безличностью
    why: «Было принято решение», «осуществляется внедрение» прячут деятеля.
    bad:
      - "было принято решение"
      - "осуществляется внедрение"
      - "был достигнут результат"
    fix: Назвать деятеля и поставить вперёд. В русском пассив мягче английского; главный враг — отглагольный канцелярит, а не залог как таковой.
    regex: "был[аои]? (принят|достигнут|реализован)\\w*|осуществля\\w+ \\w+ние"

  - id: carpet-connectors
    category: structures
    severity: medium
    title: Ковровые связки и гиперсвязность
    why: Каждое предложение пришито к предыдущему служебной фразой. Живой текст имеет «швы».
    bad:
      - "Кроме того,"
      - "Более того,"
      - "Таким образом,"
      - "Также стоит отметить,"
      - "В связи с этим,"
    fix: Убрать большинство связок, оставить логику в самом содержании.
    regex: "^(кроме того|более того|таким образом|также стоит отметить|в связи с этим),"

  - id: narrator-distance
    category: structures
    severity: medium
    title: Голос лектора издалека
    why: Парение над сценой вместо читателя внутри неё.
    bad:
      - "люди склонны откладывать"
      - "так уж устроено"
      - "никто не задумывается"
    fix: Поставить читателя в сцену через «ты/вы». «Ты откладываешь до последнего» вместо «люди склонны откладывать».
    regex: "люди (склонны|обычно|часто)|так уж устроен|никто не задумыва"

  - id: flat-rhythm
    category: structures
    severity: low
    title: Плоский ритм и ровная плотность
    why: Предложения одной длины (15–18 слов), абзацы одной плотности.
    bad:
      - "Шесть предложений подряд по 16 слов без единого короткого."
    fix: Чередовать длинное и короткое. Делать плотные и лёгкие абзацы. (Линтер считает разброс длин, см. scripts/stopslop.py.)
    regex: ""

  - id: no-idiom
    category: structures
    severity: low
    title: Стерильность без идиоматики
    why: Текст без единого фразеологизма звучит как перевод. Модель плохо работает с устойчивыми выражениями.
    bad:
      - "Абзац на тему провала плана без единого живого оборота."
    fix: Не вставлять натужно, но живой русский допускает разговорные обороты и фразеологизмы к месту.
    regex: ""

  # ------------------------------------------------------------- punctuation
  - id: em-dash-overuse
    category: punctuation
    severity: high
    title: Длинное тире ради драмы
    why: "ИИ ставит тире около 10,6 раза на 1000 слов против ~3,2 у человека, втрое чаще. Ловим не одиночное тире (для русского оно нормально: подлежащее-сказуемое, пропуск слова, пояснение), а скопление: два и больше тире в одной фразе и шаблон «не X — это Y» как драматическую паузу."
    bad:
      - "Редакция — это команда — и каждый — важен."
      - "Это не баг — это фича."
    fix: "Оставить тире там, где требует грамматика. Драматическую паузу заменить запятой, двоеточием или точкой. Скопление тире в одной фразе разбить на предложения."
    regex: " — [^.!?\\n]* — [^.!?\\n]* — |\\bне\\b[^.!?\\n]{0,40} — это\\b"

  # -------------------------------------------------------------- formatting
  - id: emoji-bullets
    category: formatting
    severity: high
    title: Эмодзи-буллеты и декор
    why: Эмодзи перед каждым пунктом списка — машинная «структурность».
    bad:
      - "⚡ Быстро"
      - "🎯 Точно"
      - "💡 Идея"
      - "✅ Готово"
    fix: Обычные маркеры списка или сплошной текст. Эмодзи как декор — убрать.
    regex: "^\\s*[⚡🎯💡✅🚀🔥👇✨📌🙌]"

  - id: bold-everywhere
    category: formatting
    severity: low
    title: Болд в каждом предложении
    why: Машина выделяет «ключевое» так часто, что выделение теряет смысл.
    bad:
      - "Это **очень важно** и **критично** для **успеха**."
    fix: Болд — для одного-двух якорей на раздел, не на каждое слово.
    regex: "(\\*\\*[^*\\n]+\\*\\*[^*\\n]*){3,}"

  - id: conclusion-header
    category: formatting
    severity: low
    title: Заголовок-штамп «Заключение/Итоги»
    why: Дежурный финал-обёртка.
    bad:
      - "## Заключение"
      - "## Итоги"
      - "## Подводя итог"
    fix: Закончить содержательной мыслью без ярлыка-обёртки.
    regex: "^#+\\s*(заключение|итоги|подводя итог)\\s*$"
